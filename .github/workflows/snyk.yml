name: Snyk Scan

on: [push, pull_request]

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - run: pip install -r requirements.txt
      - uses: actions/checkout@v3
      - uses: snyk/actions/setup@master
      - run: snyk test --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
